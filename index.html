<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>인생 RPG - 기록일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Cinzel:wght@500;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet" />

<!-- Google Identity Services (로그인) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Google API Client (Drive) -->
<script src="https://apis.google.com/js/api.js" async defer></script>

<style>
/* ============================================
   디자인 토큰
   ============================================ */
:root {
  --cream: #FAF1DC;
  --cream-soft: #F5E8C9;
  --cream-dark: #E8DAB8;
  --gold: #C8A24A;
  --gold-light: #E5C76A;
  --gold-dark: #8B6F2F;
  --brown: #6B4423;
  --brown-light: #A07847;
  --leaf: #8FA868;
  --leaf-soft: #B5C68A;
  --shadow: rgba(107, 68, 35, 0.18);
  --shadow-strong: rgba(107, 68, 35, 0.32);
  --bg-page: linear-gradient(180deg, #F5E8C9 0%, #EDD9A8 100%);

  --font-kr: 'Gowun Dodum', 'Noto Serif KR', sans-serif;
  --font-display: 'Cinzel', serif;

  --radius: 14px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-kr);
  color: var(--brown);
  background: var(--bg-page);
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.phone {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: var(--bg-page);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px var(--shadow);
}

/* ============================================
   로그인 화면
   ============================================ */
.login-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  gap: 24px;
}

.login-screen.hidden { display: none; }

.login-logo {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--gold-dark);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.login-subtitle {
  font-size: 15px;
  color: var(--brown-light);
  line-height: 1.6;
  max-width: 320px;
}

.login-decor {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin-bottom: 16px;
  box-shadow: 0 6px 20px var(--shadow-strong);
}

#googleSigninBtn {
  margin-top: 16px;
}

.google-signin-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: white;
  color: #3c4043;
  border: 1.5px solid var(--gold);
  border-radius: 24px;
  padding: 12px 24px;
  font-family: var(--font-kr);
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 2px 8px var(--shadow);
  transition: all 0.2s;
}

.google-signin-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--shadow);
  background: #fafafa;
}

.google-signin-btn:active { transform: translateY(0); }

.google-signin-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.login-status {
  font-size: 12px;
  color: var(--brown-light);
  margin-top: 8px;
  min-height: 18px;
}

.login-status.error { color: #b04545; }

/* ============================================
   상단 미니 상태창
   ============================================ */
.app-screen { display: none; flex-direction: column; flex: 1; }
.app-screen.show { display: flex; }

.mini-status {
  background: linear-gradient(180deg, var(--cream) 0%, var(--cream-soft) 100%);
  border-bottom: 2px solid var(--gold);
  padding: 12px 16px 14px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px var(--shadow);
}

.mini-status .top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  gap: 8px;
}

.user-pill {
  background: transparent;
  border: 1.5px solid var(--gold);
  color: var(--brown);
  padding: 4px 10px;
  border-radius: 16px;
  font-family: var(--font-kr);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.user-pill img {
  width: 18px; height: 18px; border-radius: 50%;
}

.page-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  color: var(--gold-dark);
  letter-spacing: 1px;
}

.sync-indicator {
  font-size: 11px;
  color: var(--brown-light);
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 60px;
  justify-content: flex-end;
}

.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--leaf);
}

.sync-dot.syncing { background: var(--gold-light); animation: pulse 1s infinite; }
.sync-dot.error { background: #c87070; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.player-info {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.level-badge {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: white;
  font-weight: bold;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-family: var(--font-display);
  box-shadow: 0 1px 3px var(--shadow);
}

.player-name {
  font-weight: bold;
  font-size: 14px;
  color: var(--brown);
}

.exp-bar-mini {
  position: relative;
  height: 8px;
  background: var(--cream-dark);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--gold-dark);
}

.exp-bar-mini .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--leaf) 0%, var(--leaf-soft) 100%);
  width: 0%;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.exp-text-mini {
  font-size: 11px;
  color: var(--brown-light);
  text-align: right;
  margin-top: 2px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  margin-top: 8px;
}

.stat-mini {
  background: var(--cream);
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 4px 2px;
  text-align: center;
  font-size: 10px;
}

.stat-mini .icon { font-size: 14px; display: block; }
.stat-mini .label { font-weight: bold; color: var(--gold-dark); font-family: var(--font-display); }
.stat-mini .value { font-size: 11px; color: var(--brown); font-weight: bold; }

.stat-mini.bump { animation: bump 0.6s ease; }
@keyframes bump {
  0%, 100% { transform: scale(1); }
  40% { transform: scale(1.15); background: var(--gold-light); }
}

/* ============================================
   탭 전환
   ============================================ */
.tab-bar {
  display: flex;
  background: var(--cream);
  border-bottom: 1px solid var(--gold);
}

.tab-btn {
  flex: 1;
  padding: 12px 8px;
  background: transparent;
  border: none;
  font-family: var(--font-kr);
  font-size: 14px;
  font-weight: bold;
  color: var(--brown-light);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}

.tab-btn.active { color: var(--brown); }

.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 12%; right: 12%;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));
  border-radius: 3px 3px 0 0;
}

/* ============================================
   탭 패널
   ============================================ */
.panel {
  flex: 1;
  display: none;
  flex-direction: column;
  padding: 14px 14px 80px;
  overflow-y: auto;
}

.panel.active { display: flex; }

.section-title {
  font-size: 13px;
  font-weight: bold;
  color: var(--gold-dark);
  margin: 14px 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-title::before, .section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* ============================================
   A탭: 빠른 기록
   ============================================ */
.recent-skills { display: flex; gap: 8px; flex-wrap: wrap; }

.recent-chip {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-soft) 100%);
  border: 1.5px solid var(--gold);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-kr);
  color: var(--brown);
  box-shadow: 0 2px 4px var(--shadow);
  transition: transform 0.15s;
}

.recent-chip:hover { transform: translateY(-2px); }
.recent-chip:active { transform: translateY(0); }

.empty-hint {
  color: var(--brown-light);
  font-size: 12px;
  padding: 10px;
  text-align: center;
  font-style: italic;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.stat-card {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-soft) 100%);
  border: 1.5px solid var(--gold);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 4px var(--shadow);
}

.stat-card:hover { transform: translateY(-1px); box-shadow: 0 4px 8px var(--shadow); }

.stat-card.expanded {
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
  color: white;
}

.stat-card .stat-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.stat-card .stat-name { font-weight: bold; font-size: 14px; }
.stat-card .stat-val { font-size: 13px; font-family: var(--font-display); font-weight: bold; }

.skill-list {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--brown-light);
  flex-direction: column;
  gap: 6px;
}

.stat-card.expanded .skill-list { display: flex; }

.skill-btn {
  background: rgba(255,255,255,0.85);
  border: 1px solid var(--gold-dark);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-family: var(--font-kr);
  font-size: 13px;
  color: var(--brown);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.15s;
}

.skill-btn:hover { background: white; }

.skill-btn .rank {
  background: var(--gold-dark);
  color: white;
  font-family: var(--font-display);
  font-weight: bold;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}

/* 빠른 기록 모달 */
.quick-form {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(107, 68, 35, 0.4);
  z-index: 50;
  align-items: flex-end;
  justify-content: center;
}

.quick-form.show { display: flex; }

.quick-form-inner {
  background: var(--cream);
  width: 100%;
  max-width: 420px;
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 18px 24px;
  border-top: 3px solid var(--gold);
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.quick-form-inner h3 {
  font-size: 16px;
  margin-bottom: 14px;
  color: var(--gold-dark);
  text-align: center;
}

.form-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.form-row label {
  width: 60px;
  font-size: 13px;
  color: var(--brown);
  font-weight: bold;
}

.form-row select, .form-row input {
  flex: 1;
  padding: 8px 10px;
  border: 1.5px solid var(--gold);
  border-radius: var(--radius-sm);
  font-family: var(--font-kr);
  font-size: 14px;
  background: white;
  color: var(--brown);
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.btn-primary, .btn-secondary, .btn-ghost, .btn-danger {
  flex: 1;
  padding: 11px;
  border-radius: var(--radius-sm);
  font-family: var(--font-kr);
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: white;
  box-shadow: 0 2px 6px var(--shadow);
}
.btn-primary:hover { transform: translateY(-1px); }

.btn-secondary {
  background: white;
  color: var(--gold-dark);
  border: 1.5px solid var(--gold);
}

.btn-ghost {
  background: transparent;
  color: var(--brown-light);
  border: 1px dashed var(--brown-light);
  font-size: 12px;
}

.btn-danger {
  background: white;
  color: #b04545;
  border: 1.5px solid #d68080;
}

/* ============================================
   B탭: 채팅
   ============================================ */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 8px;
}

.chat-msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
  animation: msgIn 0.2s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: white;
  border-bottom-right-radius: 4px;
}

.chat-msg.ai {
  align-self: flex-start;
  background: white;
  border: 1.5px solid var(--gold);
  color: var(--brown);
  border-bottom-left-radius: 4px;
}

.chat-msg.ai .ai-result {
  margin-top: 8px;
  padding: 10px;
  background: var(--cream-soft);
  border-radius: var(--radius-sm);
  border: 1px dashed var(--gold-dark);
}

.chat-msg.ai .ai-result .row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 4px;
}

.chat-msg.ai .ai-result .row .k { color: var(--brown-light); }
.chat-msg.ai .ai-result .row .v { font-weight: bold; color: var(--brown); }

.chat-msg.ai .confirm-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.chat-msg.ai .confirm-row button {
  flex: 1;
  padding: 7px;
  font-size: 12px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--font-kr);
  font-weight: bold;
  cursor: pointer;
}

.confirm-yes { background: var(--leaf); color: white; }
.confirm-edit { background: var(--cream-dark); color: var(--brown); }
.confirm-no { background: white; color: var(--brown-light); border: 1px solid var(--brown-light); }

.chat-system {
  align-self: center;
  background: var(--cream-soft);
  color: var(--brown-light);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 12px;
  font-style: italic;
  text-align: center;
}

.chat-typing {
  align-self: flex-start;
  display: flex;
  gap: 4px;
  padding: 10px 14px;
}

.chat-typing span {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.15s; }
.chat-typing span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.chat-input-bar {
  position: sticky;
  bottom: 0;
  background: var(--cream);
  border-top: 1.5px solid var(--gold);
  padding: 10px 12px;
  display: flex;
  gap: 8px;
  margin: 0 -14px -80px;
}

.chat-input-bar textarea {
  flex: 1;
  padding: 10px 12px;
  border: 1.5px solid var(--gold);
  border-radius: 18px;
  font-family: var(--font-kr);
  font-size: 14px;
  resize: none;
  max-height: 100px;
  background: white;
  color: var(--brown);
  line-height: 1.4;
}

.chat-input-bar textarea:focus { outline: 2px solid var(--gold-light); }

.send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  align-self: flex-end;
  box-shadow: 0 2px 6px var(--shadow);
  transition: transform 0.15s;
}

.send-btn:hover { transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============================================
   토스트
   ============================================ */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--brown);
  color: var(--cream);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  box-shadow: 0 4px 12px var(--shadow-strong);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  text-align: center;
  max-width: 300px;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
.toast.success { background: linear-gradient(135deg, var(--leaf) 0%, var(--leaf-soft) 100%); color: white; }
.toast.error { background: #b04545; color: white; }

/* 사용자 메뉴 */
.user-menu {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(107, 68, 35, 0.4);
  z-index: 50;
  align-items: center;
  justify-content: center;
}

.user-menu.show { display: flex; }

.user-menu-inner {
  background: var(--cream);
  width: 90%;
  max-width: 320px;
  border-radius: var(--radius);
  padding: 24px 20px;
  border: 2px solid var(--gold);
}

.user-menu-inner h3 {
  font-size: 16px;
  color: var(--gold-dark);
  margin-bottom: 12px;
  text-align: center;
}

.user-menu-inner p {
  font-size: 12px;
  color: var(--brown-light);
  margin-bottom: 16px;
  text-align: center;
  line-height: 1.5;
}

.user-menu-inner .actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

@media (max-width: 360px) {
  .stats-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="phone">

  <!-- ============================================
       로그인 화면
       ============================================ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-decor">⚔️</div>
    <div class="login-logo">LIFE RPG</div>
    <div class="login-subtitle">
      매일의 기록이 경험치가 됩니다.<br/>
      Google 계정으로 시작해 보세요.
    </div>
    <button id="googleSigninBtn" class="google-signin-btn" onclick="startGoogleSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span>Google 계정으로 로그인</span>
    </button>
    <button class="google-signin-btn" type="button" onclick="enterDevMode()">
      <span>개발 모드로 들어가기</span>

// 페이지 로드 시에도 시도 (라이브러리 로드 순서 문제 대비)
function tryInitGoogleAuth() {
  if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
    initGoogleAuth();
  } else {
    setTimeout(tryInitGoogleAuth, 200);
  }
}

function initGoogleAuth() {
  if (googleAuthReady) return;

  if (OAUTH_CLIENT_ID === "여기에_OAUTH_CLIENT_ID_입력") {
    setLoginStatus("⚠️ 코드에 OAuth 클라이언트 ID를 입력해주세요.", true);
    return;
  }

  try {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: OAUTH_CLIENT_ID,
      scope: DRIVE_SCOPE + ' https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
      callback: handleTokenResponse,
      error_callback: (err) => {
        console.error('OAuth error', err);
        setLoginStatus('로그인 실패: ' + (err.message || err.type || '알 수 없는 오류'), true);
        document.getElementById('googleSigninBtn').disabled = false;
      }
    });
    googleAuthReady = true;

    // 자동 로그인 시도 (저장된 사용자 있을 때)
    if (USER && USER.expires && Date.now() < USER.expires) {
      setLoginStatus('자동 로그인 중...');
      tokenClient.requestAccessToken({ prompt: '' });
    }
  } catch (e) {
    console.error('Init error', e);
    setLoginStatus('Google 인증 초기화 실패. 페이지를 새로고침해주세요.', true);
  }
}

// 사용자가 직접 로그인 버튼 클릭
function startGoogleSignIn() {

    setLoginStatus('Google 라이브러리 로드 중... 1-2초 후 다시 클릭해주세요.', true);
    tryInitGoogleAuth();
    return;
  }
  setLoginStatus('Google 인증창을 여는 중...');
  document.getElementById('googleSigninBtn').disabled = true;
  try {
    tokenClient.requestAccessToken({ prompt: USER ? '' : 'consent' });
  } catch (e) {
    console.error(e);
    setLoginStatus('인증창 열기 실패: ' + e.message, true);
    document.getElementById('googleSigninBtn').disabled = false;
  }
}

function handleTokenResponse(resp) {
  document.getElementById('googleSigninBtn').disabled = false;
  if (resp.error) {
    setLoginStatus('인증 실패: ' + resp.error, true);
    return;
  }
  setLoginStatus('사용자 정보를 가져오는 중...');

  const accessToken = resp.access_token;
  const expiresIn = resp.expires_in || 3600;

  // 사용자 프로필 조회
  fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: { Authorization: 'Bearer ' + accessToken }
  })
  .then(r => r.json())
  .then(profile => {
    USER = {
      name: profile.name || profile.given_name || '사용자',
      email: profile.email,
      picture: profile.picture,
      accessToken: accessToken,
      expires: Date.now() + expiresIn * 1000 - 60000
    };
    saveUser();
    onLoginSuccess();
  })
  .catch(err => {
    setLoginStatus('프로필 조회 실패', true);
    console.error(err);
  });
}

/* ============================================
   Google Drive 연동
   ============================================ */

function initGapi() {
  return new Promise((resolve) => {
    if (GAPI_READY) return resolve();
    if (typeof gapi === 'undefined') {
      setTimeout(() => initGapi().then(resolve), 200);
      return;
    }
    gapi.load('client', async () => {
      await gapi.client.init({
        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
      });
      GAPI_READY = true;
      resolve();
    });
  });
}

function setAccessToken() {
  if (!USER || !USER.accessToken) throw new Error('No access token');
  gapi.client.setToken({ access_token: USER.accessToken });
}

async function findDriveFile() {
  setAccessToken();
  const resp = await gapi.client.drive.files.list({
    q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
    fields: 'files(id,name,modifiedTime)',
    spaces: 'drive',
    pageSize: 10
  });
  const files = resp.result.files || [];
  return files.length > 0 ? files[0] : null;
}

async function loadFromDrive() {
  setAccessToken();
  const file = await findDriveFile();
  if (!file) {
    DRIVE_FILE_ID = null;
    return; // 처음 사용 → 로컬 데이터 그대로 사용
  }
  DRIVE_FILE_ID = file.id;
  const resp = await gapi.client.drive.files.get({
    fileId: DRIVE_FILE_ID,
    alt: 'media'
  });
  let data;
  try {
    data = typeof resp.result === 'string' ? JSON.parse(resp.result) : resp.result;
  } catch (e) {
    console.warn('Parse error, using local data');
    return;
  }
  if (data && typeof data === 'object') {
    PLAYER = Object.assign(PLAYER, data);
    saveLocal();
  }
}

async function saveToDrive() {
  if (DEV_SKIP_LOGIN) {
    saveLocal();
    return;
  }

  if (!USER || !USER.accessToken) return;
  if (!GAPI_READY) await initGapi();
  setAccessToken();

  const content = JSON.stringify(PLAYER, null, 2);
  const blob = new Blob([content], { type: 'application/json' });

  const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', blob);

  const url = DRIVE_FILE_ID
    ? `https://www.googleapis.com/upload/drive/v3/files/${DRIVE_FILE_ID}?uploadType=multipart`
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const method = DRIVE_FILE_ID ? 'PATCH' : 'POST';

  const resp = await fetch(url, {
    method: method,
    headers: { Authorization: 'Bearer ' + USER.accessToken },
    body: form
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error('Drive save failed: ' + errText);
  }

  const result = await resp.json();
  if (!DRIVE_FILE_ID) DRIVE_FILE_ID = result.id;
}

function scheduleSave() {
  saveLocal();
  updateSyncIndicator('syncing');
  if (SAVE_TIMER) clearTimeout(SAVE_TIMER);
  SAVE_TIMER = setTimeout(async () => {
    try {
      await saveToDrive();
      updateSyncIndicator('saved');
    } catch (err) {

function updateSyncIndicator(state) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');

const SKILL_LIST_FOR_AI = Object.entries(SKILLS).map(([id, s]) => `${id}(${s.name})`).join(', ');

async function callGeminiAnalyze(text) {
  if (GEMINI_API_KEY === "여기에_GEMINI_API_KEY_입력") {
    throw new Error('Gemini API 키가 설정되지 않았어요');
  }

  const prompt = `다음 사용자 일과 기록에서 "어떤 활동을 했는지"와 "몇 분 동안 했는지"를 추출해서 JSON으로 답해줘.

가능한 스킬 목록 (id 형식): ${SKILL_LIST_FOR_AI}

규칙:
- 가장 적합한 스킬 id 하나를 고른다 (위 목록에 없으면 "unknown")
- "오후 11시 30분부터 12시까지" 같은 표현이면 정확히 분으로 환산
- "X시간"이나 "X분" 표현이 있으면 그걸 따른다
- 시간이 명시되지 않았으면 minutes를 30으로 추정한다
- 답은 반드시 아래 JSON 형식으로만 (백틱이나 설명 없이)

{
  "skill_id": "스킬 id",
  "minutes": 정수,
  "confidence": "high|medium|low",
  "comment": "한국어로 한 문장 코멘트 (40자 이내)"
}

사용자 입력: "${text.replace(/"/g, '\\"')}"`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: { temperature: 0.2, maxOutputTokens: 200 }
  };

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error('Gemini API 오류: ' + errText.substring(0, 200));
  }

  const data = await resp.json();
  const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // JSON 파싱
  const jsonMatch = aiText.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('AI 응답을 이해할 수 없어요');

  const parsed = JSON.parse(jsonMatch[0]);
  return parsed;
}

const USE_MOCK_ANALYZER = true;

async function analyzeRecord(text) {
  if (USE_MOCK_ANALYZER) return analyzeRecordMock(text);
  return callGeminiAnalyze(text);
}

function parseMockMinutes(text) {
  const hourMinuteMatch = text.match(/(\d+(?:\.\d+)?)\s*시간\s*(\d+)\s*분/);
  if (hourMinuteMatch) {
    return Math.round(Number(hourMinuteMatch[1]) * 60 + Number(hourMinuteMatch[2]));
  }

  const hourMatch = text.match(/(\d+(?:\.\d+)?)\s*시간/);
  if (hourMatch) {
    return Math.round(Number(hourMatch[1]) * 60);
  }

  const minuteMatch = text.match(/(\d+)\s*분/);
  if (minuteMatch) {
    return Number(minuteMatch[1]);
  }

  return null;
}

function findMatchedKeywords(text, keywords) {
  return keywords.filter(keyword => text.includes(keyword));
}

function getMatchedInsightKeywords(text, depth) {
  const matched = findMatchedKeywords(text, INSIGHT_LANGUAGE_RULES[depth].keywords);
  if (depth !== 4) return matched;

  return matched.filter(keyword => {
    if (['업무', '삶', '프로젝트'].includes(keyword)) {
      return text.includes(`내 ${keyword}`) ||
        text.includes(`${keyword}에 적용`) ||
        text.includes(`${keyword} 연결`) ||
        text.includes(`${keyword} 보고 방식`);
    }
    return true;
  });
}

function analyzeRecordMock(text) {
  const activityText = String(text || '').trim();
  const minutes = parseMockMinutes(activityText);
  const matchedByDepth = {};
  const matchedDepths = [];
  const matchedMediaSources = findMatchedKeywords(activityText, INSIGHT_MEDIA_SOURCE_KEYWORDS);
  const matchedNonInsight = findMatchedKeywords(activityText, NON_INSIGHT_ACTIVITY_KEYWORDS);
  const matchedCoding = findMatchedKeywords(activityText, CODING_ACTIVITY_KEYWORDS);
  const matchedSimpleReactions = findMatchedKeywords(activityText, SIMPLE_REACTION_KEYWORDS);

  for (const depth of [1, 2, 3, 4]) {
    const matchedKeywords = getMatchedInsightKeywords(activityText, depth);
    matchedByDepth[depth] = matchedKeywords;
    if (matchedKeywords.length > 0) matchedDepths.push(depth);
  }

  const reviewReasons = [];
  const hasReadingSource = matchedDepths.includes(1);
  const hasMediaSource = matchedMediaSources.length > 0;
  const hasHigherInsightAction = matchedDepths.some(depth => depth >= 3);
  const isMediaInsightCandidate = hasMediaSource && hasHigherInsightAction;
  const isApplicable = hasReadingSource || isMediaInsightCandidate;
  const isPureNonInsight = matchedNonInsight.length > 0 && !hasReadingSource && !hasMediaSource;
  const isCodingWithoutInsightSource = matchedCoding.length > 0 && !hasReadingSource && !hasMediaSource;

  if (isPureNonInsight || isCodingWithoutInsightSource || !isApplicable) {
    let summary = '통찰의 언어 활동으로 보기 어려워요.';
    let evidence = '책, 독서, 읽기, 문서, 자료, 기사, 보고서, 글, 매뉴얼 관련 표현을 찾지 못했어요.';
    let reviewReason = '통찰의 언어 적용 대상인지 확인이 필요해요.';

    if (isPureNonInsight) {
      summary = '통찰의 언어가 아닌 생활/신체/영성 기록으로 보입니다.';
      evidence = `통찰의 언어 입력원 없이 ${matchedNonInsight.join(', ')} 표현이 있어 제외했어요.`;
      reviewReason = '';
    } else if (isCodingWithoutInsightSource) {
      summary = '코딩/오류 해결 계열 기록으로 보여요.';
      evidence = `코딩 후보 키워드(${matchedCoding.join(', ')})가 있어 통찰의 언어로 확정하지 않았어요.`;
      reviewReason = '코드의 장인 후보일 수 있어 별도 검토가 필요해요.';
    } else if (hasMediaSource && !hasHigherInsightAction) {
      summary = '유튜브/강의 기록은 아직 통찰의 언어로 확정하기 어려워요.';
      evidence = `${matchedMediaSources.join(', ')} 표현은 있지만 요약, 정리, 질문, 적용, 계획 같은 통찰 행동이 없어요.`;
      reviewReason = '유튜브/강의는 정리나 자기화가 있을 때만 통찰의 언어 후보로 봅니다.';
    } else if (matchedDepths.length > 0) {
      evidence = `행동 키워드(${matchedDepths.map(d => `${INSIGHT_LANGUAGE_RULES[d].depthName}: ${matchedByDepth[d].join(', ')}`).join(' / ')})는 있지만 읽기/자료/강의 같은 입력원이 부족해요.`;
    }

    return {
      is_applicable: false,
      skill_tree: '통찰의 언어',
      skill_id: 'insight_language',
      stat: 'INT',
      summary: '통찰의 언어 활동으로 보기 어려워요.',
      activity_text: activityText,
      source_title: null,
      minutes: null,
      estimated_minutes: null,
      ap: null,
      depth: null,
      depth_name: null,
      components: [],
      skill_exp: 0,
      stat_exp: 0,
      char_exp: 0,
      confidence: 'low',
      evidence: evidence,
      needs_review: reviewReason !== '',
      review_reason: reviewReason
    };
  }

  if (minutes === null) reviewReasons.push('시간이 명확하지 않아요.');
  if (matchedCoding.length > 0) reviewReasons.push('코딩/오류 해결 맥락은 코드의 장인 후보일 수 있어 검토가 필요해요.');
  if (hasMediaSource && !hasReadingSource) reviewReasons.push('유튜브/강의 기반 판정이라 입력 자료 성격 확인이 필요해요.');

  const depth = Math.max(...matchedDepths);
  const rule = INSIGHT_LANGUAGE_RULES[depth];
  const components = matchedDepths
    .sort((a, b) => a - b)
    .map(d => INSIGHT_LANGUAGE_RULES[d].depthName);
  const matchedKeywordText = matchedDepths
    .map(d => `${INSIGHT_LANGUAGE_RULES[d].depthName}: ${matchedByDepth[d].join(', ')}`)
    .join(' / ');
  const evidenceParts = [
    `가장 깊은 단계는 ${depth}단계 ${rule.depthName}입니다.`,
    `근거 키워드: ${matchedKeywordText}.`
  ];
  if (matchedMediaSources.length > 0) evidenceParts.push(`입력원: ${matchedMediaSources.join(', ')}.`);
  if (matchedSimpleReactions.length > 0 && depth < 4) {
    evidenceParts.push(`단순 감상(${matchedSimpleReactions.join(', ')})은 4단계 자기화로 인정하지 않았어요.`);
  }
  if (reviewReasons.length > 0) evidenceParts.push(`검토 필요: ${reviewReasons.join(' ')}`);

  return {
    is_applicable: true,
    skill_tree: '통찰의 언어',
    skill_id: 'insight_language',
    stat: 'INT',
    summary: `통찰의 언어 ${depth}단계 ${rule.depthName} 활동으로 판정했어요.`,
    activity_text: activityText,
    source_title: null,
    minutes: minutes,
    estimated_minutes: null,
    // 현재 기준: 1 AP = 60분
    ap: minutes === null ? null : Math.round((minutes / AP_MINUTES) * 100) / 100,
    depth: depth,
    depth_name: rule.depthName,
    components: components,
    skill_exp: rule.skillExp,
    stat_exp: rule.statExp,
    char_exp: rule.charExp,
    confidence: reviewReasons.length > 0 ? 'medium' : 'high',
    evidence: evidenceParts.join(' '),
    needs_review: reviewReasons.length > 0,
    review_reason: reviewReasons.join(' ')
  };
}

/* ============================================
   기록 추가 + EXP 계산
   ============================================ */

function ensureSkill(skillId) {
  if (!PLAYER.skills[skillId]) PLAYER.skills[skillId] = { exp: 0, rank: 'F' };
  return PLAYER.skills[skillId];
}

function addRecord(skillId, minutes, mode = 'quick', memo = null) {
  const skill = SKILLS[skillId];
  if (!skill) {
    showToast('알 수 없는 스킬이에요', 'error');
    return null;
  }

  const skState = ensureSkill(skillId);
  const baseExp = minutes;
  const rankBonus = RANK_BONUS[skState.rank] || 1.0;
  const statBonus = 1 + (PLAYER.stats[skill.stat] * 0.01);
  const earnedExp = Math.round(baseExp * rankBonus * statBonus);

  skState.exp += earnedExp;
  const beforeRank = skState.rank;
  const rankIdx = RANK_THRESHOLDS.findIndex(t => skState.exp < t);
  const newRankIdx = rankIdx === -1 ? RANKS.length - 1 : rankIdx - 1;
  skState.rank = RANKS[Math.max(0, newRankIdx)];
  const rankedUp = skState.rank !== beforeRank;

  const record = {
    id: 'r' + Date.now(),
    date: new Date().toISOString(),
    skillId: skillId,
    skillName: skill.name,
    stat: skill.stat,
    minutes: minutes,
    earnedExp: earnedExp,
    mode: mode,
    memo: memo
  };
  PLAYER.records.unshift(record);
  if (PLAYER.records.length > 500) PLAYER.records = PLAYER.records.slice(0, 500);

  recalcStats();
  recalcCharLevel();
  scheduleSave();
  return { record, earnedExp, rankedUp, newRank: skState.rank };
}

function addAnalyzedRecord(analysis) {
  if (!analysis || !analysis.is_applicable) {
    showToast('저장할 수 있는 분석 결과가 없어요', 'error');
    return null;
  }

  const skillId = analysis.skill_id;
  const skill = SKILLS[skillId];
  if (!skill) {
    showToast('알 수 없는 스킬이에요', 'error');
    return null;
  }

  const skState = ensureSkill(skillId);
  const skillExp = Number(analysis.skill_exp) || 0;
  const beforeRank = skState.rank;
  skState.exp += skillExp;
  const rankIdx = RANK_THRESHOLDS.findIndex(t => skState.exp < t);
  const newRankIdx = rankIdx === -1 ? RANKS.length - 1 : rankIdx - 1;
  skState.rank = RANKS[Math.max(0, newRankIdx)];
  const rankedUp = skState.rank !== beforeRank;

  const record = {
    id: 'r' + Date.now(),
    date: new Date().toISOString(),
    skillId: 'insight_language',
    skillName: '통찰의 언어',
    stat: 'INT',
    minutes: typeof analysis.minutes === 'number' ? analysis.minutes : null,
    ap: typeof analysis.ap === 'number' ? analysis.ap : null,
    depth: typeof analysis.depth === 'number' ? analysis.depth : null,
    depthName: analysis.depth_name || null,
    components: Array.isArray(analysis.components) ? analysis.components.slice() : [],
    skillExp: skillExp,
    statExp: Number(analysis.stat_exp) || 0,
    charExp: Number(analysis.char_exp) || 0,
    mode: 'detail',
    memo: analysis.activity_text || '',
    evidence: analysis.evidence || '',
    needsReview: !!analysis.needs_review
  };

  PLAYER.records.unshift(record);
  if (PLAYER.records.length > 500) PLAYER.records = PLAYER.records.slice(0, 500);

  recalcStats();
  recalcCharLevel();
  scheduleSave();
  return {
    record,
    earnedExp: skillExp,
    skillExp,
    statExp: record.statExp,
    charExp: record.charExp,
    rankedUp,
    newRank: skState.rank
  };
}

function recalcStats() {
  const newStats = { STR: 0, INT: 0, WIS: 0, DEX: 0, AGI: 0, ART: 0 };
  const quickExpBySkill = {};
  let usedRecordStats = false;

  for (const r of PLAYER.records || []) {
    if (typeof r.statExp === 'number' && r.stat && newStats[r.stat] !== undefined) {
      newStats[r.stat] += r.statExp;
      usedRecordStats = true;
    } else if (typeof r.earnedExp === 'number' && r.skillId && SKILLS[r.skillId]) {
      quickExpBySkill[r.skillId] = (quickExpBySkill[r.skillId] || 0) + r.earnedExp;
      usedRecordStats = true;
    }
  }

  if (usedRecordStats) {
    for (const [id, exp] of Object.entries(quickExpBySkill)) {
      const sk = SKILLS[id];
      if (sk) newStats[sk.stat] += Math.floor(exp / 100);
    }
  } else {
    for (const [id, st] of Object.entries(PLAYER.skills)) {
      const sk = SKILLS[id];
      if (sk) newStats[sk.stat] += Math.floor(st.exp / 100);
    }
  }

  PLAYER.stats = newStats;
}

function recalcCharLevel() {
  let totalCharExp = 0;
  let usedRecordExp = false;

  for (const r of PLAYER.records || []) {
    if (typeof r.charExp === 'number') {
      totalCharExp += r.charExp;
      usedRecordExp = true;
    } else if (typeof r.earnedExp === 'number') {
      totalCharExp += Math.floor(r.earnedExp / 10);
      usedRecordExp = true;
    }
  }

  if (!usedRecordExp) {
    let total = 0;
    for (const st of Object.values(PLAYER.skills)) total += st.exp;
    totalCharExp = Math.floor(total / 10);
  }

  PLAYER.charExp = totalCharExp;

  let lv = 1;
  while (lv * (lv + 1) * 50 <= PLAYER.charExp) lv++;
  PLAYER.level = lv;
  PLAYER.charNextExp = lv * (lv + 1) * 50;
  PLAYER.charPrevExp = (lv - 1) * lv * 50;
}

function renderMiniStatus() {
  document.getElementById('lv').textContent = PLAYER.level;
  const cur = PLAYER.charExp - (PLAYER.charPrevExp || 0);
  const need = (PLAYER.charNextExp || 100) - (PLAYER.charPrevExp || 0);
  const pct = Math.min(100, Math.floor((cur / need) * 100));
  document.getElementById('expFill').style.width = pct + '%';
  document.getElementById('expText').textContent = `${cur} / ${need} EXP (${pct}%)`;

  const row = document.getElementById('statsRow');
  row.innerHTML = '';
  for (const [key, info] of Object.entries(STATS)) {
    const val = PLAYER.stats[key] || 0;
    row.insertAdjacentHTML('beforeend', `
      <div class="stat-mini" data-stat="${key}">
        <span class="icon">${info.icon}</span>
        <span class="label">${key}</span>
        <span class="value">${val}</span>
      </div>
    `);
  }
}

function renderRecent() {
  const box = document.getElementById('recentSkills');
  const seen = new Set();
  const recent = [];
  for (const r of PLAYER.records) {
    if (!seen.has(r.skillId) && SKILLS[r.skillId]) {
      seen.add(r.skillId);
      recent.push(r.skillId);
    }
    if (recent.length >= 5) break;
  }
  if (recent.length === 0) {
    box.innerHTML = '<div class="empty-hint">아직 기록이 없어요. 아래에서 스킬을 골라 시작해 봐요!</div>';
    return;
  }
  box.innerHTML = recent.map(id => {
    const sk = SKILLS[id];
    return `<button class="recent-chip" onclick="openQuickForm('${id}')">${sk.icon} ${sk.name}</button>`;
  }).join('');
}

function renderStatsGrid() {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  for (const [key, info] of Object.entries(STATS)) {
    const skillsInStat = Object.entries(SKILLS).filter(([id, s]) => s.stat === key);
    const val = PLAYER.stats[key] || 0;
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.dataset.stat = key;
    card.innerHTML = `
      <div class="stat-head">
        <span class="stat-name">${info.icon} ${key} ${info.name}</span>
        <span class="stat-val">${val}</span>
      </div>
      <div class="skill-list">
        ${skillsInStat.map(([id, sk]) => {
          const st = PLAYER.skills[id] || { rank: 'F', exp: 0 };
          return `
            <button class="skill-btn" onclick="event.stopPropagation(); openQuickForm('${id}');">
              <span>${sk.icon} ${sk.name}</span>
              <span class="rank">${st.rank}</span>
            </button>
          `;
        }).join('')}
      </div>
    `;
    card.addEventListener('click', () => {
      const wasExpanded = card.classList.contains('expanded');
      grid.querySelectorAll('.stat-card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!wasExpanded) card.classList.add('expanded');
    });
    grid.appendChild(card);
  }
}

function renderAll() {
  renderMiniStatus();
  renderRecent();
  renderStatsGrid();
  document.getElementById('umStats').textContent =
    `Lv.${PLAYER.level} · 총 기록 ${PLAYER.records.length}개 · 총 EXP ${PLAYER.charExp}`;
}

  div.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let pendingAnalysis = null;

function formatAnalysisValue(value, suffix = '') {
  return value === null || value === undefined || value === '' ? '알 수 없음' : `${value}${suffix}`;
}

function renderAnalysisPreview(analysis, title = '💡 이렇게 분석했어요!') {
  const skill = SKILLS[analysis.skill_id] || SKILLS.insight_language;
  const depthLabel = analysis.depth ? `${analysis.depth}단계 ${analysis.depth_name}` : '해당 없음';
  const reviewLabel = analysis.needs_review
    ? `필요${analysis.review_reason ? ` (${escapeHtml(analysis.review_reason)})` : ''}`
    : '불필요';
  const components = Array.isArray(analysis.components) && analysis.components.length > 0
    ? analysis.components.join(', ')
    : '없음';

  return `
    ${title}
    ${analysis.summary ? `<div style="font-size:12px; color:#A07847; margin-top:4px;">${escapeHtml(analysis.summary)}</div>` : ''}
    <div class="ai-result">
      <div class="row"><span class="k">스킬트리</span><span class="v">${skill.icon} ${escapeHtml(analysis.skill_tree || skill.name)}</span></div>
      <div class="row"><span class="k">도달 깊이</span><span class="v">${escapeHtml(depthLabel)}</span></div>
      <div class="row"><span class="k">AP</span><span class="v">${formatAnalysisValue(analysis.ap)}</span></div>
      <div class="row"><span class="k">스킬 EXP</span><span class="v">+${analysis.skill_exp || 0}</span></div>
      <div class="row"><span class="k">${analysis.stat || 'INT'} EXP</span><span class="v">+${analysis.stat_exp || 0}</span></div>
      <div class="row"><span class="k">캐릭터 EXP</span><span class="v">+${analysis.char_exp || 0}</span></div>
      <div class="row"><span class="k">구성요소</span><span class="v">${escapeHtml(components)}</span></div>
      <div class="row"><span class="k">판정 근거</span><span class="v">${escapeHtml(analysis.evidence || '')}</span></div>
      <div class="row"><span class="k">검토 필요</span><span class="v">${reviewLabel}</span></div>
    </div>
    <div class="confirm-row">
      <button class="confirm-yes" onclick="confirmAnalysis()">✅ 맞아요</button>
      <button class="confirm-edit" onclick="editAnalysis()">✏️ 시간 수정</button>
      <button class="confirm-no" onclick="cancelAnalysis()">취소</button>
    </div>
  `;
}

async function handleSend() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  appendChat(escapeHtml(text), 'user');
  input.value = '';
  input.style.height = 'auto';

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  appendTyping();

  try {
    const result = await analyzeRecord(text);
    removeTyping();

    if (!result.is_applicable || !result.skill_id || result.skill_id === 'unknown' || !SKILLS[result.skill_id]) {
      appendChat(`
        🤔 이번 mock 판정기는 <strong>통찰의 언어</strong>만 분석해요.<br/>
        ${result.summary ? escapeHtml(result.summary) + '<br/>' : ''}
        <small style="color:#A07847;">${escapeHtml(result.evidence || '책/읽기/문서 관련 표현을 포함해서 다시 적어주세요.')}</small>
      `, 'ai');
      return;
    }

    pendingAnalysis = result;
    appendChat(renderAnalysisPreview(result), 'ai');
  } catch (err) {
    removeTyping();
    console.error(err);
    appendChat(`⚠️ AI 분석 중 오류가 발생했어요.<br/><small style="color:#A07847;">${escapeHtml(err.message)}</small>`, 'ai');
  } finally {
    sendBtn.disabled = false;
  }
}

function estimateExp(skillId, minutes) {
  const sk = SKILLS[skillId];
  const skState = PLAYER.skills[skillId] || { rank: 'F', exp: 0 };
  const rankBonus = RANK_BONUS[skState.rank] || 1.0;
  const statBonus = 1 + (PLAYER.stats[sk.stat] * 0.01);
  return Math.round(minutes * rankBonus * statBonus);
}

function confirmAnalysis() {
  if (!pendingAnalysis) return;
  const analysis = pendingAnalysis;
  const result = addAnalyzedRecord(analysis);
  pendingAnalysis = null;
  if (result) {
    appendChat(`
      ✨ 기록 완료! <strong>${SKILLS.insight_language.name} +${result.skillExp} 스킬 EXP</strong><br/>
      <small>INT +${result.statExp} EXP · 캐릭터 +${result.charExp} EXP</small>
      ${result.rankedUp ? `<br/>🎉 랭크업! → <strong>${result.newRank}</strong>` : ''}
    `, 'ai');
    renderAll();
    animateStatBump('INT');
  }
}

function editAnalysis() {
  if (!pendingAnalysis) return;
  const currentMinutes = pendingAnalysis.minutes === null ? '' : pendingAnalysis.minutes;
  const newMin = prompt(`시간(분)을 수정하세요. 현재: ${currentMinutes || '알 수 없음'}`, currentMinutes);
  if (newMin === null) return;
  const n = parseInt(newMin);
  if (isNaN(n) || n < 1 || n > 1440) {
    appendChat('⚠️ 시간은 1분~1440분 사이여야 해요.', 'ai');
    return;
  }
  pendingAnalysis.minutes = n;
  // 현재 기준: 1 AP = 60분
  pendingAnalysis.ap = Math.round((n / AP_MINUTES) * 100) / 100;
  pendingAnalysis.needs_review = false;
  pendingAnalysis.review_reason = '';
  pendingAnalysis.confidence = 'high';
  appendChat(renderAnalysisPreview(pendingAnalysis, '수정했어요!'), 'ai');
}

function cancelAnalysis() {
  pendingAnalysis = null;
  appendChat('알겠어요. 다시 적어주세요.', 'ai');
}

const chatInput = document.getElementById('chatInput');
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(100, chatInput.scrollHeight) + 'px';
});
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

/* ============================================
   사용자 메뉴
   ============================================ */

function openUserMenu() {
  document.getElementById('userMenu').classList.add('show');
}

function closeUserMenu() {
  document.getElementById('userMenu').classList.remove('show');
}

document.getElementById('userMenu').addEventListener('click', (e) => {
  if (e.target.id === 'userMenu') closeUserMenu();
});

/* ============================================
   토스트 + 애니메이션
   ============================================ */

let toastTimer = null;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.className = 'toast ' + type;
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add('show'));
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

function animateStatBump(stat) {
  const el = document.querySelector(`.stat-mini[data-stat="${stat}"]`);
  if (!el) return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
}
